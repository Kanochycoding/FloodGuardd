<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
    />
    <title>Notifications - Flood Guard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="top-nav">
        <div class="nav-left">
          <a class="nav-tab" href="index.html">Home</a>
          <a class="nav-tab" href="flood-reports.html">Flood Photo Reports</a>
          <a class="nav-tab" href="news.html">Flood News</a>
          <a class="nav-tab" href="about.html">About the App</a>
        </div>
        <div class="top-right-menu">
          <div class="quick-menu">
            <button id="top-menu-button" class="menu-icon-btn" type="button">☰</button>
            <div id="top-menu-dropdown" class="menu-dropdown hidden" role="menu">
              <a href="settings.html" role="menuitem" class="menu-item">Settings</a>
              <a href="notifications.html" role="menuitem" class="menu-item">Notifications</a>
              <a href="saved-alerts.html" role="menuitem" class="menu-item">Saved Alerts</a>
              <a href="help-support.html" role="menuitem" class="menu-item">Help & Support</a>
              <a href="about.html" role="menuitem" class="menu-item">About App</a>
            </div>
          </div>
        </div>
      </nav>

      <header class="hero">
        <p class="eyebrow">Alerts</p>
        <h1>Notifications</h1>
      </header>

      <section class="media-report-panel">
        <form id="notification-settings-form" class="report-form">
          <p id="notification-permission-status" class="report-time"></p>
          <label>
            <input id="alerts-enabled" type="checkbox" checked />
            Enable flood alerts
          </label>
          <label>
            <input id="notify-high-only" type="checkbox" checked />
            Notify for High risk only
          </label>
          <label>
            <input id="notify-moderate-high" type="checkbox" />
            Notify for Moderate and High risk
          </label>
          <label>
            <input id="quiet-hours-emergency-only" type="checkbox" checked />
            Emergency-only alerts during quiet hours
          </label>
          <label for="quiet-hours">Quiet Hours</label>
          <input id="quiet-hours" type="text" value="10:00 PM - 6:00 AM" />
          <div class="form-actions-inline">
            <button id="update-notifications-btn" type="submit" class="btn btn-primary">
              Update Notifications
            </button>
            <button id="request-notification-permission-btn" type="button" class="btn btn-secondary">
              Allow Browser Notifications
            </button>
            <button id="test-notification-btn" type="button" class="btn btn-secondary">
              Test Notification
            </button>
          </div>
          <p id="notification-settings-status" class="report-time"></p>
        </form>
      </section>

      <section class="photo-list-panel">
        <h3>Recent Alert History</h3>
        <div id="notification-history-list" class="report-list"></div>
      </section>
    </main>
    <script src="security.js"></script>
    <script src="top-menu.js"></script>
    <script src="notifications.js"></script>
  </body>
</html>
